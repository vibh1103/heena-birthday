<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05030a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Heena's Birthday Adventure</title>
  </head>
  <body>
    <main id="app" class="min-h-dvh overflow-hidden bg-[#05030a] text-white">
      <section class="game-shell">
        <div class="hud-panel">
          <div>
            <p class="text-xs uppercase tracking-[0.32em] text-fuchsia-200/70">Birthday Quest</p>
            <h1 class="text-xl font-semibold text-white sm:text-2xl">Heena's Birthday Adventure</h1>
          </div>
          <div class="hidden items-center gap-3 text-sm text-fuchsia-100/80 sm:flex">
            <span class="rounded-full border border-fuchsia-300/25 px-3 py-1">WASD / Arrows</span>
            <span class="rounded-full border border-fuchsia-300/25 px-3 py-1">Space to talk</span>
          </div>
        </div>
        <div id="game-container" class="game-container" aria-label="Heena's Birthday Adventure game canvas"></div>
      </section>
      
      <div class="orientation-warning">
        <svg viewBox="0 0 24 24">
          <path d="M16 1H8C6.34 1 5 2.34 5 4v16c0 1.66 1.34 3 3 3h8c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-2 20h-4v-1h4v1zm3-3H7V4h10v14z"/>
        </svg>
        <h2>Rotate Your Device</h2>
        <p>Please rotate your device to landscape mode for the best birthday adventure experience!</p>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
